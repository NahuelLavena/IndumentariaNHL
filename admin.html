<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Indumentaria NHL</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- LOGIN -->
  <div id="loginView" class="login-view">
    <div class="login-box">
      <h1>Admin</h1>
      <p>Ingresá a tu cuenta</p>
      <form id="loginForm">
        <input type="email" id="loginEmail" value="nahuel.lavena@gmail.com" readonly>
        <input type="password" id="loginPass" placeholder="Contraseña" required>
        <button type="submit" class="btn btn-primary">Ingresar</button>
      </form>
      <p id="loginError" class="error-msg"></p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboardView" class="dashboard-view" style="display: none;">
    <nav class="admin-nav">
      <span class="admin-brand">Panel Admin</span>
      <div class="admin-nav-right">
        <button class="btn btn-ghost" onclick="openAddModal()">+ Agregar Producto</button>
        <button class="btn btn-ghost" onclick="logout()">Cerrar sesión</button>
      </div>
    </nav>

    <main class="admin-main">
      <div class="admin-header">
        <h2>Productos</h2>
        <div class="filter-bar">
          <select id="filterCategory" onchange="loadProducts()">
            <option value="todos">Todas las categorías</option>
            <option value="remera-oversize">Remeras Oversize</option>
            <option value="remera-clasico">Remeras Clásico</option>
            <option value="buzo">Buzos</option>
            <option value="pantalon">Pantalones</option>
          </select>
        </div>
      </div>
      <div class="products-grid" id="productsGrid"></div>
    </main>
  </div>

  <!-- MODAL FORMULARIO -->
  <div id="productModal" class="modal-backdrop" style="display: none;">
    <div class="modal-wrap">
      <button class="modal-close" onclick="closeProductModal()">✕</button>
      <div class="modal">
        <div class="modal-content">
          <h2 id="modalTitle">Agregar Producto</h2>
          <form id="productForm">
            <input type="hidden" id="productId">
            
            <div class="form-group">
              <label for="productName">Nombre</label>
              <input type="text" id="productName" required>
            </div>

            <div class="form-group">
              <label for="productCategory">Categoría</label>
              <select id="productCategory" required>
                <option value="remera-oversize">Remera Oversize</option>
                <option value="remera-clasico">Remera Clásico</option>
                <option value="buzo">Buzo</option>
                <option value="pantalon">Pantalón</option>
              </select>
            </div>

            <div class="form-group">
              <label for="productDesc">Descripción</label>
              <textarea id="productDesc" rows="3"></textarea>
            </div>

            <div class="form-group">
              <label for="productPrice">Precio (opcional)</label>
              <input type="text" id="productPrice" placeholder="Ej: $25.000">
            </div>

            <div class="form-group">
              <label for="productTalles">Talles</label>
              <input type="text" id="productTalles" placeholder="Ej: S, M, L, XL">
            </div>

            <div class="form-group">
              <label class="checkbox-label">
                <input type="checkbox" id="productAvailable" checked>
                <span>Disponible</span>
              </label>
            </div>

            <div class="form-group">
              <label>Imágenes (hasta 4)</label>
              <div class="image-upload-area" id="imageUploadArea">
                <div class="image-previews" id="imagePreviews"></div>
                <div class="upload-btn-wrapper">
                  <button type="button" class="btn btn-ghost" onclick="document.getElementById('imageInput').click()">+ Agregar imágenes</button>
                  <input type="file" id="imageInput" accept="image/*" multiple onchange="handleImageSelect(event)">
                </div>
              </div>
            </div>

            <div class="form-actions">
              <button type="button" class="btn btn-ghost" onclick="closeProductModal()">Cancelar</button>
              <button type="submit" class="btn btn-primary">Guardar</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL VER PRODUCTO -->
  <div id="viewModal" class="modal-backdrop" style="display: none;">
    <div class="modal-wrap">
      <button class="modal-close" onclick="closeViewModal()">✕</button>
      <div class="modal">
        <div class="modal-img" id="viewModalImg"></div>
        <div class="modal-content">
          <div class="modal-cat" id="viewModalCat"></div>
          <div class="modal-title" id="viewModalName"></div>
          <div class="modal-desc" id="viewModalDesc"></div>
          <div class="modal-meta">
            <span id="viewModalPrice"></span>
            <span id="viewModalTalles"></span>
          </div>
          <div class="modal-actions">
            <button class="btn btn-primary" onclick="editFromView()">Editar</button>
            <button class="btn btn-ghost" onclick="deleteFromView()">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL CONFIRMACION -->
  <div id="confirmModal" class="modal-backdrop" style="display: none;">
    <div class="modal-wrap confirm-wrap">
      <div class="modal confirm-modal">
        <div class="modal-content">
          <h3>¿Confirmar eliminación?</h3>
          <p>El producto será eliminado permanentemente.</p>
          <div class="form-actions">
            <button class="btn btn-ghost" onclick="closeConfirmModal()">Cancelar</button>
            <button class="btn btn-primary" style="background: #ff3b1f;" onclick="confirmDelete()">Eliminar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

  <script src="js/admin.js"></script>
</body>
</html>
